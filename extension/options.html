<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Reader AI — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #f9f9f9; color: #333; min-height: 100vh; }
    .page { max-width: 560px; margin: 0 auto; padding: 36px 24px 60px; }
    h1 { font-size: 18px; font-weight: 700; color: #111; margin-bottom: 6px; }
    .subtitle { font-size: 12px; color: #aaa; margin-bottom: 28px; }

    /* Provider cards */
    .provider-card {
      background: #fff;
      border: 1.5px solid #e8e8e8;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    .provider-card.active { border-color: #07c160; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .provider-name { font-size: 13px; font-weight: 600; flex: 1; }
    .active-badge {
      font-size: 10px;
      font-weight: 700;
      background: #07c160;
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      display: none;
    }
    .provider-card.active .active-badge { display: inline; }

    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
    .field input { width: 100%; padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 12px; font-family: inherit; outline: none; }
    .field input:focus { border-color: #07c160; }

    .card-footer { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
    .btn-use { background: #07c160; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-use:hover { background: #06ad56; }
    .provider-card.active .btn-use { background: #e8e8e8; color: #999; cursor: default; }
    .btn-save-key { background: #fff; color: #333; border: 1px solid #ddd; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .btn-save-key:hover { background: #f5f5f5; }
    .save-status { font-size: 11px; color: #07c160; min-width: 40px; }

    /* Divider */
    hr { border: none; border-top: 1px solid #eee; margin: 28px 0; }

    /* Notes section */
    .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 10px; }
    .notes-count { font-size: 13px; color: #555; margin-bottom: 12px; }
    .btn-export { background: #fff; color: #333; border: 1px solid #ddd; padding: 8px 16px; border-radius: 7px; font-size: 12px; cursor: pointer; }
    .btn-export:hover { background: #f5f5f5; }
    .hint { font-size: 12px; color: #777; line-height: 1.7; margin-top: 10px; }
    code { background: #f0f0f0; padding: 1px 4px; border-radius: 4px; font-size: 11px; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Reader AI</h1>
    <p class="subtitle">配置 AI 服务商 — key 会自动保存，随时切换使用</p>

    <div id="providers-container"></div>

    <hr>

    <p class="section-title">Reader Profile</p>
    <p class="hint" style="margin-top:0">告诉 AI 你是谁、为什么读——所有分析、Reader Value 和 Action Ideas 都会写给这个具体的你，而不是泛泛的读者。自动保存。</p>
    <textarea id="reader-profile" style="width:100%; min-height:110px; margin-top:8px; padding:10px; border:1px solid #ddd; border-radius:7px; font-size:13px; line-height:1.6; font-family:inherit; resize:vertical; box-sizing:border-box"></textarea>
    <div style="display:flex; align-items:center; gap:10px; margin-top:6px">
      <button class="btn-export" id="profile-reset">恢复默认画像</button>
      <span class="save-status" id="profile-status"></span>
    </div>

    <hr>

    <p class="section-title">Saved Notes</p>
    <p class="notes-count" id="notes-count">Loading…</p>
    <button class="btn-export" id="btn-export">Export all notes as Markdown</button>
    <p class="hint">导出文件会先落到下载目录，再被同步脚本收纳到 <code>personal/projects/reading-notes/reading</code> 并刷新索引。</p>
  </div>

  <script src="options.js"></script>
</body>
</html>
