<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>WeChat Reader AI</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="app">

    <header class="header">
      <span class="logo">微信阅读助手</span>
      <button id="btn-settings" class="icon-btn" title="Settings">⚙</button>
    </header>

    <div id="article-bar" class="article-bar hidden">
      <button id="btn-reanalyze" class="icon-btn small reanalyze hidden" title="重新分析（忽略缓存，重新调用 AI）">⟳</button>
      <div id="article-title" class="article-title"></div>
      <div id="article-meta" class="article-meta"></div>
    </div>

    <div id="state-no-article" class="state-panel">
      <div class="state-icon">Read</div>
      <p>打开一篇微信公众号文章<br>或小红书笔记，再点击下方按钮识别</p>
      <button id="btn-detect" class="btn-secondary">识别当前文章</button>
    </div>

    <div id="state-detected" class="state-panel hidden">
      <div class="state-icon">Ready</div>
      <p id="detected-message">已识别文章，可以开始分析</p>
      <button id="btn-analyze" class="btn-primary centered">开始分析</button>
    </div>

    <div id="state-loading" class="state-panel hidden">
      <div class="spinner"></div>
      <p id="loading-message">正在处理…</p>
    </div>

    <div id="state-error" class="state-panel hidden">
      <div class="state-icon">⚠️</div>
      <p id="error-message"></p>
      <button id="btn-retry" class="btn-secondary">重试</button>
    </div>

    <div id="main-content" class="main-content hidden">
      <section class="section">
        <h3 class="section-title">Summary</h3>
        <div id="summary-text" class="section-body"></div>
      </section>

      <section class="section">
        <h3 class="section-title">Core Points</h3>
        <div id="structure-text" class="section-body"></div>
      </section>

      <section class="section">
        <h3 class="section-title">Key Insights</h3>
        <div id="insights-text" class="section-body"></div>
      </section>

      <section class="section">
        <h3 class="section-title">Core Excerpts</h3>
        <div class="section-hint">点击 `P#` 可以跳回文章对应段落。</div>
        <div id="excerpts-text" class="section-body"></div>
      </section>

      <section class="section">
        <h3 class="section-title">Reader Value</h3>
        <div id="reader-value-text" class="section-body"></div>
      </section>

      <section class="section hidden" id="action-ideas-section">
        <h3 class="section-title">Action Ideas</h3>
        <div class="section-hint">由你的批注延伸生成，锚定原文段落、贴合你的画像。</div>
        <div id="action-ideas-text" class="section-body"></div>
      </section>

      <section class="section">
        <h3 class="section-title">Core Conclusion</h3>
        <div id="conclusion-text" class="section-body"></div>
      </section>

      <section class="section">
        <h3 class="section-title">Author Intent &amp; Take</h3>
        <div id="author-text" class="section-body"></div>
      </section>

      <div class="save-row">
        <textarea id="my-notes" class="my-notes" placeholder="My notes…"></textarea>
        <div class="action-row">
          <button id="btn-save-note" class="btn-primary">Save Note</button>
          <button id="btn-export-current" class="btn-secondary">Export Markdown</button>
        </div>
      </div>

      <div class="comment-row">
        <div class="comment-title">Optimize with Comment</div>
        <textarea id="comment-input" class="my-notes" placeholder="告诉我你希望怎么改这份输出，例如：更像投资备忘录 / 补充反方观点 / 把洞察改成可行动建议 / 不要太像 AI"></textarea>
        <div class="action-row">
          <button id="btn-apply-comment" class="btn-primary">Apply Comment</button>
          <span id="comment-status" class="inline-status"></span>
        </div>
        <div id="comment-log" class="comment-log hidden"></div>
      </div>
    </div>

    <div id="chat-section" class="chat-section hidden">
      <div class="chat-header">
        <span>Chat</span>
        <button id="btn-clear-chat" class="icon-btn small" title="Clear">↺</button>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-row">
        <input id="chat-input" class="chat-input" type="text" placeholder="Ask about this article…">
        <button id="btn-send" class="btn-send">↑</button>
      </div>
    </div>

  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
